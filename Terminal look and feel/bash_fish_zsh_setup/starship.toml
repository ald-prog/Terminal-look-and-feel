# ------------------ USER ------------------

[username]
show_always = true
style_user = "bg:mauve fg:crust"
style_root = "bg:red fg:crust"
format = "[$user]($style)"

# ------------------ HOSTNAME ------------------

[hostname]
ssh_only = false
style = "bg:mauve fg:crust"
format = "[@$hostname]($style)"

# ------------------ DIRECTORY ------------------

[directory]
style = "fg:crust bg:yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

# ------------------ GIT ------------------

[git_branch]
symbol = "´Éİ"
style = "bg:blue fg:crust"
format = "[$symbol $branch]($style)"

[git_status]
style = "bg:blue fg:crust"
format = "[$all_status$ahead_behind]($style)"

# ------------------ LANGUAGES ------------------

[c]
symbol = "¯İŞ "
style = "bg:green fg:crust"
format = "[$symbol($version)]($style)"

[rust]
symbol = "¯Ş¿"
style = "bg:green fg:crust"
format = "[$symbol($version)]($style)"

[golang]
symbol = "¯İğ"
style = "bg:green fg:crust"
format = "[$symbol($version)]($style)"

[nodejs]
symbol = "¯£İ"
