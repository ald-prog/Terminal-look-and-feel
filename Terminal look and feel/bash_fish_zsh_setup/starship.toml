# ------------------ COMMAND DURATION ------------------

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "bg:lavender fg:crust"
disabled = false
show_notifications = true
min_time_to_notify = 45000

# ------------------ TIME ------------------

[time]
disabled = false
time_format = "%R"
style = "bg:surface2"
format = "[´É║ $time]($style)"

# ------------------ PROMPT CHARACTER ------------------

[character]
success_symbol = "[ÔØ»ÔØ»ÔØ»](bold fg:green)"
error_symbol = "[ÔØ»ÔØ»ÔØ»](bold fg:red)"

# ------------------ COLOR PALETTE ------------------

[palettes.breeze_dark]
